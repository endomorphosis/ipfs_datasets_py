<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>IPFS Datasets MCP Dashboard</title>
    <style>
        :root {
            color-scheme: light;
            --border: #d1d5db;
            --surface: #ffffff;
            --muted: #4b5563;
            --text: #111827;
            --accent: #2563eb;
            --ok: #047857;
            --warn: #b45309;
            --bg: #f3f4f6;
        }

        body {
            margin: 0;
            font-family: Inter, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
            background: var(--bg);
            color: var(--text);
        }

        header {
            background: var(--surface);
            border-bottom: 1px solid var(--border);
            padding: 18px 28px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        h1 {
            margin: 0;
            font-size: 22px;
            font-weight: 650;
        }

        main {
            max-width: 1180px;
            margin: 0 auto;
            padding: 28px;
        }

        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 16px;
        }

        .panel {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 18px;
        }

        .label {
            color: var(--muted);
            font-size: 13px;
            margin-bottom: 6px;
        }

        .value {
            font-size: 26px;
            font-weight: 700;
        }

        .badge {
            border: 1px solid var(--border);
            border-radius: 999px;
            padding: 6px 10px;
            font-size: 13px;
            background: #f9fafb;
        }

        .badge.ok {
            border-color: #a7f3d0;
            background: #ecfdf5;
            color: var(--ok);
        }

        .badge.warn {
            border-color: #fde68a;
            background: #fffbeb;
            color: var(--warn);
        }

        pre {
            overflow: auto;
            margin: 0;
            padding: 16px;
            background: #111827;
            color: #f9fafb;
            border-radius: 8px;
        }

        section {
            margin-top: 18px;
        }
    </style>
</head>
<body>
    <header>
        <h1>IPFS Datasets MCP Dashboard</h1>
        <span id="status-badge" class="badge warn">Checking</span>
    </header>
    <main>
        <div class="status-grid">
            <div class="panel">
                <div class="label">Service Status</div>
                <div id="service-status" class="value">Unknown</div>
            </div>
            <div class="panel">
                <div class="label">Tools Available</div>
                <div id="tools-available" class="value">0</div>
            </div>
            <div class="panel">
                <div class="label">Active Executions</div>
                <div id="active-executions" class="value">0</div>
            </div>
            <div class="panel">
                <div class="label">Total Executions</div>
                <div id="total-executions" class="value">0</div>
            </div>
        </div>
        <section class="panel">
            <div class="label">Raw Status</div>
            <pre id="raw-status">Loading...</pre>
        </section>
    </main>
    <script>
        async function refreshStatus() {
            const badge = document.getElementById('status-badge');
            try {
                const response = await fetch('/api/mcp/status', { cache: 'no-store' });
                if (!response.ok) {
                    throw new Error(`HTTP ${response.status}`);
                }
                const status = await response.json();
                document.getElementById('service-status').textContent = status.status || 'running';
                document.getElementById('tools-available').textContent = status.tools_available ?? 0;
                document.getElementById('active-executions').textContent = status.active_executions ?? 0;
                document.getElementById('total-executions').textContent = status.total_executions ?? 0;
                document.getElementById('raw-status').textContent = JSON.stringify(status, null, 2);
                badge.textContent = 'Running';
                badge.className = 'badge ok';
            } catch (error) {
                document.getElementById('raw-status').textContent = error.message;
                badge.textContent = 'Unavailable';
                badge.className = 'badge warn';
            }
        }

        refreshStatus();
        setInterval(refreshStatus, 5000);
    </script>
</body>
</html>
